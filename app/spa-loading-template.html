<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg-page: #f5f4ed;
        --bg-card: #faf9f5;
        --text-main: #141413;
        --text-muted: #5e5d59;
        --text-soft: #87867f;
        --brand: #c96442;
        --brand-soft: rgb(201 100 66 / 0.22);
        --border: #e8e6dc;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(52rem 32rem at 20% 10%, rgb(201 100 66 / 0.08), transparent 70%),
          radial-gradient(48rem 28rem at 88% 100%, rgb(125 83 54 / 0.06), transparent 72%),
          var(--bg-page);
        color: var(--text-main);
        font-family:
          "Anthropic Sans",
          Inter,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
      }

      .loader-shell {
        position: relative;
        display: grid;
        justify-items: center;
        gap: 0.85rem;
        width: min(28rem, calc(100vw - 2rem));
        padding: clamp(1.25rem, 3.2vw, 2rem);
        border: 1px solid var(--border);
        border-radius: 1.25rem;
        background: var(--bg-card);
        box-shadow: 0 0 0 1px rgb(240 238 230 / 0.75);
      }

      .logo-wrap {
        width: clamp(5rem, 14vw, 7.1rem);
        height: clamp(5rem, 14vw, 7.1rem);
        display: grid;
        place-items: center;
        border-radius: 999px;
        border: 1px solid var(--border);
        box-shadow:
          0 0 0 1px rgb(232 230 220 / 0.9),
          0 10px 24px -20px rgb(20 20 19 / 0.3);
        background:
          radial-gradient(circle at 50% 50%, rgb(201 100 66 / 0.06), transparent 62%),
          var(--bg-card);
        animation: pulseHalo 2.1s ease-in-out infinite;
      }

      .sipac-loader {
        width: clamp(3.3rem, 10vw, 4.8rem);
        height: clamp(3.3rem, 10vw, 4.8rem);
        opacity: 0.98;
      }

      .brand {
        font-family: "Anthropic Serif", Georgia, "Times New Roman", serif;
        font-size: clamp(1.12rem, 2.3vw, 1.45rem);
        line-height: 1.2;
        font-weight: 600;
        letter-spacing: 0.03em;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.28rem;
        font-size: clamp(0.84rem, 1.6vw, 0.95rem);
        line-height: 1.45;
        color: var(--text-muted);
      }

      .dot {
        width: 0.24rem;
        height: 0.24rem;
        border-radius: 999px;
        background: var(--brand);
        opacity: 0.35;
        animation: dotBlink 1.15s ease-in-out infinite;
      }

      .dot:nth-child(2) {
        animation-delay: 0.18s;
      }

      .dot:nth-child(3) {
        animation-delay: 0.36s;
      }

      .progress {
        width: min(18rem, 100%);
        height: 0.34rem;
        margin-top: 0.1rem;
        border-radius: 999px;
        background: rgb(232 230 220 / 0.8);
        overflow: hidden;
      }

      .progress > span {
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: var(--brand);
        animation: progressSlide 1.55s cubic-bezier(0.22, 1, 0.36, 1) infinite;
      }

      @keyframes pulseHalo {
        0% {
          box-shadow:
            0 0 0 1px rgb(232 230 220 / 0.9),
            0 10px 24px -20px rgb(20 20 19 / 0.25);
        }
        50% {
          box-shadow:
            0 0 0 1px rgb(201 100 66 / 0.36),
            0 12px 24px -20px rgb(201 100 66 / 0.35);
        }
        100% {
          box-shadow:
            0 0 0 1px rgb(232 230 220 / 0.9),
            0 10px 24px -20px rgb(20 20 19 / 0.25);
        }
      }

      @keyframes progressSlide {
        0% {
          transform: translateX(-115%);
        }
        100% {
          transform: translateX(270%);
        }
      }

      @keyframes dotBlink {
        0%,
        100% {
          opacity: 0.3;
          transform: translateY(0);
        }
        50% {
          opacity: 1;
          transform: translateY(-0.06rem);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .logo-wrap,
        .progress > span,
        .dot {
          animation: none !important;
        }
      }

      @media (max-width: 480px) {
        .loader-shell {
          border-radius: 1rem;
          gap: 0.72rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="loader-shell" role="status" aria-live="polite" aria-label="Cargando SIPAc">
      <div class="logo-wrap">
        <img class="sipac-loader" src="/favicon.svg" alt="SIPAc" />
      </div>

      <div class="brand">SIPAc</div>
      <div class="status">
        Cargando
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <div class="progress" aria-hidden="true"><span></span></div>
    </div>
  </body>
</html>
