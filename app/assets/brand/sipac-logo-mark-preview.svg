<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g stroke-linejoin="round" stroke-linecap="round">
    <!-- Chevron 1 (Top) -->
    <g transform-origin="50px 50px">
      <polygon points="50,10 50,30 32.68,40 32.68,20" fill="#e08b66" />
      <polygon points="50,10 67.32,20 67.32,40 50,30" fill="#f3a683" />
    </g>
    <!-- Chevron 2 (Top Right) -->
    <g transform-origin="50px 50px" transform="rotate(60)">
      <polygon points="50,10 50,30 32.68,40 32.68,20" fill="#e08b66" />
      <polygon points="50,10 67.32,20 67.32,40 50,30" fill="#f3a683" />
    </g>
    <!-- Chevron 3 (Bottom Right) -->
    <g transform-origin="50px 50px" transform="rotate(120)">
      <polygon points="50,10 50,30 32.68,40 32.68,20" fill="#e08b66" />
      <polygon points="50,10 67.32,20 67.32,40 50,30" fill="#f3a683" />
    </g>
    <!-- Chevron 4 (Bottom) -->
    <g transform-origin="50px 50px" transform="rotate(180)">
      <polygon points="50,10 50,30 32.68,40 32.68,20" fill="#e08b66" />
      <polygon points="50,10 67.32,20 67.32,40 50,30" fill="#f3a683" />
    </g>
    <!-- Chevron 5 (Bottom Left) -->
    <g transform-origin="50px 50px" transform="rotate(240)">
      <polygon points="50,10 50,30 32.68,40 32.68,20" fill="#e08b66" />
      <polygon points="50,10 67.32,20 67.32,40 50,30" fill="#f3a683" />
    </g>
    <!-- Chevron 6 (Top Left) -->
    <g transform-origin="50px 50px" transform="rotate(300)">
      <polygon points="50,10 50,30 32.68,40 32.68,20" fill="#e08b66" />
      <polygon points="50,10 67.32,20 67.32,40 50,30" fill="#f3a683" />
    </g>
  </g>
</svg>
