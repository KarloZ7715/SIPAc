<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g stroke-linejoin="round" stroke-linecap="round">
    <!-- 3 Inner Rhombi (Holes in the center negative space) -->
    <!-- Rhombus 11 (Top-Left) -->
    <polygon points="50,36 37.876,29 37.876,43" fill="#f3a683" />
    <polygon points="50,50 50,36 37.876,43" fill="#e08b66" />

    <!-- Rhombus 3 (Right) -->
    <polygon points="62.124,43 74.248,50 62.124,57" fill="#f3a683" />
    <polygon points="50,50 62.124,43 62.124,57" fill="#e08b66" />

    <!-- Rhombus 7 (Bottom-Left) -->
    <polygon points="37.876,57 37.876,71 50,64" fill="#f3a683" />
    <polygon points="50,50 37.876,57 50,64" fill="#e08b66" />

    <!-- 6 Outer Chevrons -->
    <!-- Chevron 12 (Top) -->
    <polygon points="37.876,29 50,36 50,22" fill="#f3a683" />
    <polygon points="62.124,29 50,36 50,22" fill="#e08b66" />

    <!-- Chevron 2 (Top-Right) -->
    <polygon points="62.124,29 62.124,43 74.248,36" fill="#f3a683" />
    <polygon points="74.248,50 62.124,43 74.248,36" fill="#e08b66" />

    <!-- Chevron 4 (Bottom-Right) -->
    <polygon points="74.248,50 62.124,57 74.248,64" fill="#f3a683" />
    <polygon points="62.124,71 62.124,57 74.248,64" fill="#e08b66" />

    <!-- Chevron 6 (Bottom) -->
    <polygon points="62.124,71 50,64 50,78" fill="#f3a683" />
    <polygon points="37.876,71 50,64 50,78" fill="#e08b66" />

    <!-- Chevron 8 (Bottom-Left) -->
    <polygon points="37.876,71 37.876,57 25.752,64" fill="#f3a683" />
    <polygon points="25.752,50 37.876,57 25.752,64" fill="#e08b66" />

    <!-- Chevron 10 (Top-Left) -->
    <polygon points="25.752,50 37.876,43 25.752,36" fill="#f3a683" />
    <polygon points="37.876,29 37.876,43 25.752,36" fill="#e08b66" />
  </g>
</svg>
