name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit & integration tests with coverage
        run: pnpm test:coverage
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_API_KEY_TEST: ${{ secrets.GOOGLE_API_KEY_TEST }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OCR_PROVIDER: gemini

      - name: Build
        run: pnpm build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_API_KEY_TEST: ${{ secrets.GOOGLE_API_KEY_TEST }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OCR_PROVIDER: gemini

      - name: Prepare npm audit lockfile
        run: npm install --package-lock-only --ignore-scripts --no-fund --no-audit

      - name: Audit dependencies
        run: npm audit --audit-level=high

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.adminCommand({ ping: 1 })\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: E2E tests
        run: pnpm test:e2e
        env:
          CI: true
          PLAYWRIGHT_E2E_SEEDED_DB: 1
          MONGODB_URI: mongodb://127.0.0.1:27017/sipac_e2e
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_API_KEY_TEST: ${{ secrets.GOOGLE_API_KEY_TEST }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_APP_URL: ${{ secrets.OPENROUTER_APP_URL }}
